name: Go

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.go'
      - '**.mod'
      - '**.s'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.go'
      - '**.mod'
      - '**.s'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.config.name }})
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-24.04
        - ubuntu-24.04-arm
        config:
        # "No AVX-512" forces the AVX2 leaf kernels at compile time (the cpuid
        # detection asm is dropped and HasAVX512 is a hardcoded false), so it
        # needs no emulator; expect "0" makes TestExpectedISA confirm the tag
        # actually disabled AVX-512.
        - { name: "Standard",   tags: "",                     flags: "-race", expect: "" }
        - { name: "Pure Go",    tags: "purego",               flags: "",      expect: "" }
        - { name: "No AVX-512", tags: "kt128_disable_avx512", flags: "-race", expect: "0" }
        exclude:
          # Pure Go and the amd64-only disable tag add nothing on arm64.
          - os: ubuntu-24.04-arm
            config: { name: "Pure Go",    tags: "purego",               flags: "",      expect: "" }
          - os: ubuntu-24.04-arm
            config: { name: "No AVX-512", tags: "kt128_disable_avx512", flags: "-race", expect: "0" }
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true

    - name: Build
      run: go build -tags "${{ matrix.config.tags }}" ./...

    - name: Test
      env:
        KT128_EXPECT_AVX512: ${{ matrix.config.expect }}
      run: go test ${{ matrix.config.flags }} -tags "${{ matrix.config.tags }}" ./...

  sde:
    name: SDE (${{ matrix.target.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
        # Emulate a CPU with AVX-512F+VL (Sapphire Rapids) and one with AVX2 but
        # no AVX-512 (Haswell) so both leaf-kernel families run regardless of the
        # GitHub runner's actual CPU. spr is the most modern model SDE emulates
        # and closest to deployed AVX-512 hardware. KT128_EXPECT_AVX512 makes the
        # binary assert it took the intended path; see TestExpectedISA.
        - { name: "AVX-512 (spr)", chip: "spr", expect: "1" }
        - { name: "AVX2 (hsw)",    chip: "hsw", expect: "0" }
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true

    - name: Setup SDE
      uses: petarpetrovt/setup-sde@v5.0
      with:
        environmentVariableName: SDE_PATH
        sdeVersion: "10.8.0"

    # Compile natively, then emulate only the test binary so SDE never has to run
    # the Go toolchain.
    - name: Build test binary
      run: go test -c -o kt128.test .

    - name: Test under SDE
      env:
        KT128_EXPECT_AVX512: ${{ matrix.target.expect }}
      run: $SDE_PATH/sde64 -${{ matrix.target.chip }} -- ./kt128.test -test.v -test.timeout 20m

  bigendian:
    name: Big-endian (s390x)
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true

    # Register binfmt handlers so the kernel runs s390x binaries through QEMU.
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3

    # s390x is big-endian, so this exercises the pure-Go path's LittleEndian byte
    # handling on a big-endian host; the asm targets are build-excluded there.
    - name: Test
      env:
        GOARCH: s390x
      run: go test ./...

  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
        # 386 is the only 32-bit dimension (int is 32-bit); wasm is a distinct
        # platform. Other ports compile the same pure-Go files as the test jobs,
        # and endianness does not affect compilation, so they add no coverage.
        - { name: "linux/386",   goos: linux,  goarch: "386" }
        - { name: "wasip1/wasm", goos: wasip1, goarch: wasm }
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true

    - name: Build
      env:
        GOOS: ${{ matrix.target.goos }}
        GOARCH: ${{ matrix.target.goarch }}
      run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: false

    - name: go fmt
      run: go fmt ./... && git diff --exit-code

    - name: go vet
      run: go vet ./...

    - name: go fix
      run: go fix ./... && git diff --exit-code

    - name: go mod tidy
      run: go mod tidy && git diff --exit-code

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true

    # No third-party deps, so this mainly catches standard-library and toolchain
    # vulnerabilities for the Go version in use.
    - name: govulncheck
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
